name: test
on:
  push:
    paths: [setup.sh, .github/workflows/test.yml]
  schedule:
    - cron: '0 6 * * 1' # weekly: catch upstream drift (moved URLs, API changes)
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        image: ['ubuntu:24.04', 'debian:12']
    runs-on: ubuntu-latest
    container: ${{ matrix.image }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: fresh install
        run: bash setup.sh
      - name: tools work
        run: zsh -ic "nvim --version | head -1; starship -V; fd --version; lazygit --version | head -1; rg --version | head -1; node -v; claude --version"
      - name: re-run is idempotent
        run: bash setup.sh
